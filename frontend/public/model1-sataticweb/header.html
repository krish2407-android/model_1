<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>header</title>
    <link rel="stylesheet" href="./css/header.css">
</head>
<body>
    <header class="header">
        <div class="logo">Silver</div>
        <nav class="nav">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="cart.html">Cart</a>
            <a href="contact.html">Contact</a>
            <a href="category.html">Category</a>
            <a href="Help.html">Help</a>
            <a href="profile.html" data-nav="profile" style="display:none;">My Profile</a>
            <a href="Login.html" data-nav="login">Login</a>
        </nav>
    </header>
    <script>
        (function () {
            var logged = localStorage.getItem('silverLoggedIn') === '1';
            var profile = document.querySelector('[data-nav="profile"]');
            var login = document.querySelector('[data-nav="login"]');
            if (profile && login) {
                profile.style.display = logged ? 'inline' : 'none';
                login.style.display = logged ? 'none' : 'inline';
            }
        })();
    </script>
</body>
</html>
