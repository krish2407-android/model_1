<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baby Girl</title>
    <link rel="stylesheet" href="./css/productmen.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>

    <div id="header"></div>

    <section class="section">
        <h1>Baby Girl Collection</h1>
        <div class="container">
            <div class="product-card" data-product-id="babyg-skirt-1">
                <img src="./img/g1.jpg" alt="Pink Frock">
                <div class="product-info">
                    <h2>Skirt</h2>
                    <p>Cute frock for baby girls.</p>
                    <h3>₹699</h3>
                    <div class="btn-row">
                        <button type="button" class="btn btn-cart">Add To Cart</button>
                        <button type="button" class="btn btn-buy">Buy Now</button>
                    </div>
                </div>
            </div>
            <div class="product-card" data-product-id="babyg-skirt-2">
                <img src="./img/g2.jpg" alt="Blue Jeans">
                <div class="product-info">
                    <h2>Skirt</h2>
                    <p>Comfortable skirt.</p>
                    <h3>₹1499</h3>
                    <div class="btn-row">
                        <button type="button" class="btn btn-cart">Add To Cart</button>
                        <button type="button" class="btn btn-buy">Buy Now</button>
                    </div>
                </div>
            </div>
            <div class="product-card" data-product-id="babyg-pink-fork">
                <img src="./img/g3.jpg" alt="Winter Hoodie">
                <div class="product-info">
                    <h2>pink fork</h2>
                    <p>pink fork for child.</p>
                    <h3>₹1999</h3>
                    <div class="btn-row">
                        <button type="button" class="btn btn-cart">Add To Cart</button>
                        <button type="button" class="btn btn-buy">Buy Now</button>
                    </div>
                </div>
            </div>
            <div class="product-card" data-product-id="babyg-pink-skirt">
                <img src="./img/g4.jpg" alt="Leather Jacket">
                <div class="product-info">
                    <h2>pink skirt</h2>
                    <p>Pink skirt for women.</p>
                    <h3>₹3499</h3>
                    <div class="btn-row">
                        <button type="button" class="btn btn-cart">Add To Cart</button>
                        <button type="button" class="btn btn-buy">Buy Now</button>
                    </div>
                </div>
            </div>
            <div class="product-card" data-product-id="babyg-t-shirt">
                <img src="./img/g5.jpg" alt="Black T-Shirt">
                <div class="product-info">
                    <h2>T-Shirt</h2>
                    <p>T-shirt for child girl.</p>
                    <h3>₹799</h3>
                    <div class="btn-row">
                        <button type="button" class="btn btn-cart">Add To Cart</button>
                        <button type="button" class="btn btn-buy">Buy Now</button>
                    </div>
                </div>
            </div>
            <div class="product-card" data-product-id="babyg-classical-kurti">
                <img src="./img/g6.jpg" alt="Formal Blazer">
                <div class="product-info">
                    <h2>classical kurti</h2>
                    <p>classical kurti for girl.</p>
                    <h3>₹2999</h3>
                    <div class="btn-row">
                        <button type="button" class="btn btn-cart">Add To Cart</button>
                        <button type="button" class="btn btn-buy">Buy Now</button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div id="footer"></div>

    <script>
        function getCart() {
            return JSON.parse(localStorage.getItem('silverCart')) || [];
        }

        function saveCart(cart) {
            localStorage.setItem('silverCart', JSON.stringify(cart));
        }

        function getProductFromCard(card) {
            return {
                id: card.getAttribute('data-product-id'),
                name: card.querySelector('.product-info h2').textContent,
                desc: card.querySelector('.product-info p').textContent,
                price: parseInt(card.querySelector('.product-info h3').textContent.replace(/\D/g, '')),
                image: card.querySelector('img').getAttribute('src')
            };
        }

        function addToCart(btn) {
            var p = getProductFromCard(btn.closest('.product-card'));
            var cart = getCart();
            var found = cart.find(function(item) { return item.id === p.id; });
            if (found) {
                found.qty += 1;
            } else {
                cart.push({ id: p.id, name: p.name, desc: p.desc, price: p.price, image: p.image, qty: 1 });
            }
            saveCart(cart);
            alert(p.name + ' added to cart!');
        }

        function buyNow(btn) {
            var p = getProductFromCard(btn.closest('.product-card'));
            window.location.href = 'productdetail.html?id=' + encodeURIComponent(p.id);
        }

        document.querySelectorAll('.product-card').forEach(function(card) {
            card.classList.add('clickable');
            card.addEventListener('click', function(e) {
                if (e.target.closest('button')) return;
                window.location.href = 'productdetail.html?id=' + encodeURIComponent(card.getAttribute('data-product-id'));
            });
        });

        document.querySelectorAll('.btn-cart').forEach(function(btn) {
            btn.addEventListener('click', function(e) {
                e.stopPropagation();
                addToCart(this);
            });
        });

        document.querySelectorAll('.btn-buy').forEach(function(btn) {
            btn.addEventListener('click', function(e) {
                e.stopPropagation();
                buyNow(this);
            });
        });

        $(document).ready(function() {
            $("#header").load("header.html");
            $("#footer").load("footer.html");
        });
    </script>

</body>
</html>
