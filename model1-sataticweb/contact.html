<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="./css/contact.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>

    <div id="header"></div>

    <section class="section">
        <div class="container">
            <div class="left">
                <h1>Contact Silver Fashion</h1>
                <p>Have questions about our latest fashion collections, orders, or delivery? Feel free to contact us anytime.</p>
                <div class="detail">
                    <h3>Address</h3>
                    <p>Ahmedabad, Gujarat, India</p>
                </div>
                <div class="detail">
                    <h3>Email</h3>
                    <p>silverfashion@gmail.com</p>
                </div>
                <div class="detail">
                    <h3>Phone</h3>
                    <p>+91 9876543210</p>
                </div>
            </div>
            <div class="rightform">
                <form>
                    <input type="text" placeholder="Enter Your Name" required>
                    <input type="email" placeholder="Enter Your Email" required>
                    <input type="text" placeholder="Subject" required>
                    <textarea rows="5" placeholder="Write Your Message"></textarea>
                    <button type="submit" class="btn">Send Message</button>
                </form>
            </div>
        </div>
        <div class="map">
            <iframe
                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3670.1854928480457!2d72.5346378!3d23.090304600000003!
                2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x395e833af6f39347%3A0xf1db9065daea7008!2sSilver%20Oak%20University!
                5e0!3m2!1sen!2sin!4v1778766226550!5m2!1sen!2sin"
                allowfullscreen=""
                loading="lazy">
            </iframe>
        </div>
    </section>

    <div id="footer"></div>

    <script>
        $(document).ready(function() {
            $("#header").load("header.html");
            $("#footer").load("footer.html");
        });
    </script>

</body>
</html>
