<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="./css/register.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>
<body>
    <div id="header"></div>
    <section class="section">
        <form class="form" id="registerForm">
            <h2>Create Account</h2>
            <p class="text">
                Join the Silver Fashion community
            </p>
            <div class="input">
                <label for="fullname">Full Name</label>
                <input type="text" id="fullname" name="fullname"
                    placeholder="Enter your name" autocomplete="name">
                <span class="field-error" id="err_fullname" role="alert"></span>
            </div>
            <div class="input">
                <label for="email">Email</label>
                <input type="email" id="email" name="email"
                    placeholder="Enter your email" autocomplete="email">
                <span class="field-error" id="err_email" role="alert"></span>
            </div>
            <div class="input">
                <label for="password">Password</label>
                <input type="password" id="password" name="password"
                    placeholder="Create password" autocomplete="new-password">
                <span class="field-error" id="err_password" role="alert"></span>
            </div>
            <div class="input">
                <label for="confirm">Confirm Password</label>
                <input type="password" id="confirm" name="confirm"
                    placeholder="Confirm password" autocomplete="new-password">
                <span class="field-error" id="err_confirm" role="alert"></span>
            </div>

            <div class="agree-wrap" id="agreeWrap">
                <div class="agree">
                    <input type="checkbox" id="terms" name="terms">
                    <span>
                        I agree to the
                        <a href="#">Terms & Conditions</a>
                    </span>
                </div>
                <span class="field-error" id="err_terms" role="alert"></span>
            </div>

            <button type="submit" class="btn">
                Sign Up
            </button>

            <p class="link">
                Already have an account?
                <a href="Login.html">Login Here</a>
            </p>

        </form>

    </section>

    <div id="footer"></div>

    <script>
        $(document).ready(function () {
            $('#header').load('header.html');
            $('#footer').load('footer.html');

            var namePattern = /^[A-Za-z ]+$/;
            var emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            var passwordPattern = /^(?=.*[A-Z])(?=.*[0-9]).{6,}$/;

            function clearAllErrors() {
                $('.field-error').text('');
                $('#fullname, #email, #password, #confirm').removeClass(
                    'input-error'
                );
                $('#agreeWrap').removeClass('agree-error');
            }

            function setFieldError(inputId, message) {
                $('#' + inputId).addClass('input-error');
                $('#err_' + inputId).text(message);
            }

            function clearFieldError(inputId) {
                $('#' + inputId).removeClass('input-error');
                $('#err_' + inputId).text('');
            }

            function validateFullname() {
                var name = $('#fullname').val().trim();
                clearFieldError('fullname');
                if (name === '') {
                    setFieldError('fullname', 'Please enter your full name');
                    return false;
                }
                if (!namePattern.test(name)) {
                    setFieldError(
                        'fullname',
                        'Name should contain only letters and spaces'
                    );
                    return false;
                }
                return true;
            }

            function validateEmail() {
                var email = $('#email').val().trim().toLowerCase();
                clearFieldError('email');
                if (email === '') {
                    setFieldError('email', 'Please enter your email');
                    return false;
                }
                if (!emailPattern.test(email)) {
                    setFieldError('email', 'Please enter a valid email address');
                    return false;
                }
                return true;
            }

            function validatePassword() {
                var password = $('#password').val();
                clearFieldError('password');
                if (password === '') {
                    setFieldError('password', 'Please enter a password');
                    return false;
                }
                if (!passwordPattern.test(password)) {
                    setFieldError(
                        'password',
                        'Min 6 characters, with 1 uppercase letter and 1 number'
                    );
                    return false;
                }
                return true;
            }

            function validateConfirm() {
                var password = $('#password').val();
                var confirm = $('#confirm').val();
                clearFieldError('confirm');
                if (confirm === '') {
                    setFieldError('confirm', 'Please confirm your password');
                    return false;
                }
                if (password !== confirm) {
                    setFieldError('confirm', 'Passwords do not match');
                    return false;
                }
                return true;
            }

            function validateTerms() {
                $('#err_terms').text('');
                $('#agreeWrap').removeClass('agree-error');
                if (!$('#terms').is(':checked')) {
                    $('#err_terms').text(
                        'Please accept the Terms & Conditions'
                    );
                    $('#agreeWrap').addClass('agree-error');
                    return false;
                }
                return true;
            }

            $('#fullname').on('blur', validateFullname);
            $('#fullname').on('input', function () {
                if ($('#err_fullname').text()) validateFullname();
            });

            $('#email').on('blur', validateEmail);
            $('#email').on('input', function () {
                if ($('#err_email').text()) validateEmail();
            });

            $('#password').on('blur', validatePassword);
            $('#password').on('input', function () {
                if ($('#err_password').text()) validatePassword();
                if ($('#err_confirm').text()) validateConfirm();
            });

            $('#confirm').on('blur', validateConfirm);
            $('#confirm').on('input', function () {
                if ($('#err_confirm').text()) validateConfirm();
            });

            $('#terms').on('change', function () {
                if ($(this).is(':checked')) {
                    $('#err_terms').text('');
                    $('#agreeWrap').removeClass('agree-error');
                }
            });

            $('#registerForm').on('submit', function (e) {
                e.preventDefault();
                clearAllErrors();

                var vName = validateFullname();
                var vEmail = validateEmail();
                var vPass = validatePassword();
                var vConfirm = validateConfirm();
                var vTerms = validateTerms();

                if (
                    !(
                        vName &&
                        vEmail &&
                        vPass &&
                        vConfirm &&
                        vTerms
                    )
                ) {
                    var $first = $('.input-error').first();
                    if ($first.length) {
                        $first.trigger('focus');
                    } else if (!$('#terms').is(':checked')) {
                        $('#terms').trigger('focus');
                    }
                    return;
                }

                var name = $('#fullname').val().trim();
                var email = $('#email').val().trim().toLowerCase();
                var password = $('#password').val();

                var users = JSON.parse(
                    localStorage.getItem('silverUsers') || '[]'
                );

                var exists = users.some(function (u) {
                    return u.email === email;
                });

                if (exists) {
                    setFieldError(
                        'email',
                        'This email is already registered'
                    );
                    $('#email').trigger('focus');
                    return;
                }

                users.push({
                    name: name,
                    email: email,
                    password: password
                });

                localStorage.setItem(
                    'silverUsers',
                    JSON.stringify(users)
                );

                localStorage.setItem(
                    'silverUser',
                    JSON.stringify({
                        name: name,
                        email: email
                    })
                );

                localStorage.setItem('silverLoggedIn', '1');

                alert('Account created successfully!');
                window.location.href = 'index.html';
            });
        });
    </script>

</body>
</html>
