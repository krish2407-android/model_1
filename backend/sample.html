<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semantic Elements Example</title>
    <style>
        *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:whitesmoke;
    min-height:100vh;
    display:flex;
    flex-direction:column;
}

/* Header */
header{
    background:black;
    color:white;
    text-align:center;
    padding:25px;
}

header h1{
    font-size:48px;
}

/* Navigation */
nav{
    background:gray;
    padding:18px;
    text-align:center;
}

nav a{
    color:white;
    text-decoration:none;
    margin:0 20px;
    font-size:18px;
}

nav a:hover{
    text-decoration:underline;
}

/* Main Container */
main{
    max-width:1300px;
    width:100%;
    margin:30px auto;
    padding:0 20px;

    display:grid;
    grid-template-columns:2fr 1.5fr 1fr;
    gap:25px;
}

/* Section */
section{
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 0 10px lightgray;
}

section h2{
    margin-bottom:15px;
    font-size:36px;
}

/* Article */
article{
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 0 10px lightgray;
}

article h2{
    margin-bottom:15px;
    font-size:32px;
}

/* Aside */
aside{
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 0 10px lightgray;
}

aside h3{
    margin-bottom:15px;
    font-size:28px;
    border-bottom:2px solid lightgray;
    padding-bottom:10px;
}

aside ul{
    list-style:none;
}

aside ul li{
    margin-bottom:12px;
}

aside ul li a{
    text-decoration:none;
    color:black;
    display:block;
    padding:12px;
    background:whitesmoke;
    border-radius:8px;
    transition:0.3s;
}

aside ul li a:hover{
    background:lightgray;
    padding-left:20px;
}

/* Footer */
footer{
    background:black;
    color:white;
    text-align:center;
    padding:25px;
    margin-top:auto;
}

/* Mobile Responsive */
@media(max-width:992px){

    main{
        grid-template-columns:1fr;
    }

    section,
    article,
    aside{
        width:100%;
    }

    header h1{
        font-size:36px;
    }
}
    </style>
</head>
<body>

    <header>
        <h1>My Website</h1>
    </header>

    <nav>
        <a href="#">Home</a> |
        <a href="#">About</a> |
        <a href="#">Services</a> |
        <a href="#">Contact</a>
    </nav>

    <main>
        <section>
            <h2>About Us</h2>
            <p>This is the about section of the website.</p>
        </section>

        <article>
            <h2>Latest News</h2>
            <p>This is a news article.</p>
        </article>

        <aside>
            <h3>Related Links</h3>
            <ul>
                <li><a href="#">Link 1</a></li>
                <li><a href="#">Link 2</a></li>
            </ul>
        </aside>
    </main>

    <footer>
        <p>&copy; 2026 My Website. All Rights Reserved.</p>
    </footer>

</body>
</html>
